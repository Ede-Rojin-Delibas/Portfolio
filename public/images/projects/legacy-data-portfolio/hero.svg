<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auroraBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#041021" />
      <stop offset="45%" stop-color="#062028" />
      <stop offset="100%" stop-color="#021517" />
    </linearGradient>

    <linearGradient id="auroraGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c1c3" stop-opacity="0.16" />
      <stop offset="40%" stop-color="#8b5cf6" stop-opacity="0.18" />
      <stop offset="70%" stop-color="#60a5fa" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.12" />
    </linearGradient>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="t" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="t" mode="overlay" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#auroraBase)" />

  <!-- vertical aurora bars inspired by uploaded image -->
  <g opacity="0.9">
    <rect x="0" y="120" width="1600" height="420" fill="url(#auroraGlow)" mask="url(#bars)" />
  </g>

  <defs>
    <mask id="bars">
      <rect width="1600" height="540" fill="black" />
      <!-- repeating vertical bars -->
      <g fill="white" opacity="0.9">
        <!-- create bars with subtle gradient fade -->
        <!-- use a pattern of thin stripes -->
        <!-- 80px pattern -->
        <rect x="0" y="0" width="6" height="540" />
        <rect x="16" y="0" width="6" height="540" />
        <rect x="32" y="0" width="6" height="540" />
        <rect x="48" y="0" width="6" height="540" />
        <rect x="64" y="0" width="6" height="540" />
        <rect x="80" y="0" width="6" height="540" />
        <rect x="96" y="0" width="6" height="540" />
        <!-- replicate by scaling transform to cover width -->
        <g transform="translate(128)">
          <use href="#repBars" />
        </g>
      </g>
    </mask>
    <g id="repBars">
      <rect x="0" y="0" width="6" height="540" />
      <rect x="16" y="0" width="6" height="540" />
      <rect x="32" y="0" width="6" height="540" />
      <rect x="48" y="0" width="6" height="540" />
      <rect x="64" y="0" width="6" height="540" />
      <rect x="80" y="0" width="6" height="540" />
      <rect x="96" y="0" width="6" height="540" />
    </g>
  </defs>

  <!-- faint stars / particles -->
  <g opacity="0.22" fill="#ffffff">
    <circle cx="120" cy="60" r="0.8" />
    <circle cx="420" cy="40" r="0.6" />
    <circle cx="820" cy="30" r="0.7" />
    <circle cx="1250" cy="80" r="0.5" />
    <circle cx="1480" cy="50" r="0.6" />
  </g>

  <!-- subtle reflective band at bottom to mimic mirrored feel -->
  <rect x="0" y="540" width="1600" height="360" fill="black" opacity="0.06" />

  <!-- title card hint -->
  <g transform="translate(96,120)">
    <rect width="480" height="72" rx="12" fill="#ffffff" opacity="0.04" />
    <text x="28" y="44" font-family="Inter, Arial, sans-serif" font-size="22" fill="#dbeafe" font-weight="700">Legacy Data Portfolio</text>
  </g>

</svg>