<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="meshA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="18%" stop-color="#0ea5c9" stop-opacity="0.78" />
      <stop offset="45%" stop-color="#60a5fa" stop-opacity="0.62" />
      <stop offset="72%" stop-color="#8b5cf6" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.12" />
    </linearGradient>

    <radialGradient id="glow" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.36" />
      <stop offset="40%" stop-color="#60a5fa" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <pattern id="techGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="transparent" />
      <path d="M0 0 L32 0" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
      <path d="M0 0 L0 32" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
      <circle cx="1" cy="1" r="0.9" fill="rgba(255,255,255,0.02)" />
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#meshA)" />

  <!-- soft colored blobs for mesh feel -->
  <g filter="url(#softGlow)">
    <ellipse cx="300" cy="240" rx="420" ry="260" fill="#0ea5c966" />
    <ellipse cx="1180" cy="160" rx="420" ry="260" fill="#8b5cf666" />
    <ellipse cx="900" cy="640" rx="540" ry="340" fill="#60a5fa44" />
  </g>

  <!-- translucent panel to match site card -->
  <rect x="88" y="96" width="1424" height="488" rx="20" fill="rgba(255,255,255,0.03)" />

  <!-- technical grid overlay -->
  <rect width="1600" height="900" fill="url(#techGrid)" opacity="0.22" />

  <!-- faux window cards to hint product UI -->
  <g transform="translate(120,140)">
    <rect width="540" height="320" rx="12" fill="#020617" opacity="0.9" />
    <rect x="560" y="0" width="840" height="320" rx="12" fill="#07111f" opacity="0.9" />
    <rect x="28" y="18" width="180" height="22" rx="8" fill="#60a5fa" opacity="0.95" />
    <rect x="28" y="62" width="320" height="10" rx="5" fill="#ffffff" opacity="0.08" />
    <rect x="600" y="28" width="320" height="18" rx="8" fill="#22d3ee" opacity="0.9" />
  </g>

  <!-- accent left blob -->
  <ellipse cx="72" cy="720" rx="220" ry="220" fill="url(#glow)" opacity="0.6" />

  <!-- site-like title mark -->
  <g transform="translate(120,520)">
    <rect width="420" height="72" rx="14" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.03)" />
    <text x="28" y="44" font-family="Inter, Arial, sans-serif" font-size="22" fill="#cfe9ff" font-weight="700">Ede-Rojin Portfolio</text>
  </g>

</svg>